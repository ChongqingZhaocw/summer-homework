<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>小升初暑期作业 · 七年级预习计划</title>
<style>
﻿/* ========================================
   小升初暑期作业 · 七年级预习计划
   iPad自适应样式表
   ======================================== */

/* CSS变量 */
:root {
  --primary: #4A90D9;
  --primary-dark: #357ABD;
  --primary-light: #E8F0FE;
  --success: #52C41A;
  --warning: #FAAD14;
  --danger: #FF4D4F;
  --chinese: #D94A4A;
  --math: #2B6CB0;
  --english: #38A169;
  --bg: #F5F7FA;
  --card-bg: #FFFFFF;
  --text: #2D3748;
  --text-light: #718096;
  --border: #E2E8F0;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  -webkit-font-smoothing: antialiased;
  touch-action: manipulation;
}

/* ======= 头部导航 ======= */
.header {
  background: linear-gradient(135deg, var(--primary), #6B5CE7);
  color: white;
  padding: 20px 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 10px rgba(74,144,217,0.3);
}
.header h1 { font-size: 1.3rem; font-weight: 700; }
.header .subtitle { font-size: 0.85rem; opacity: 0.9; margin-top: 4px; }

/* ======= 日期导航 ======= */
.day-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--card-bg);
  padding: 12px 16px;
  margin: 12px;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.day-nav .nav-btn {
  width: 44px; height: 44px;
  border: none; border-radius: 50%;
  background: var(--primary-light);
  color: var(--primary);
  font-size: 1.4rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
}
.day-nav .nav-btn:active { transform: scale(0.92); background: var(--primary); color: white; }
.day-nav .day-info { text-align: center; }
.day-nav .day-info .day-num { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
.day-nav .day-info .day-date { font-size: 0.8rem; color: var(--text-light); }
.day-nav .day-info .day-progress {
  font-size: 0.75rem; color: var(--text-light); margin-top: 2px;
}
.day-selector {
  display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 16px 4px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.day-dot {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid var(--border); background: var(--card-bg);
  font-size: 0.7rem; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.day-dot.active { border-color: var(--primary); background: var(--primary); color: white; }
.day-dot.completed { border-color: var(--success); background: #F6FFED; color: var(--success); }
.day-dot.active.completed { background: var(--success); border-color: var(--success); color: white; }
.day-dot:active { transform: scale(0.9); }

/* ======= 今日概览 ======= */
.summary-bar {
  margin: 0 12px 12px;
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.summary-item {
  background: var(--card-bg); border-radius: var(--radius-sm); padding: 10px 8px;
  text-align: center; box-shadow: var(--shadow);
}
.summary-item .label { font-size: 0.7rem; color: var(--text-light); }
.summary-item .value { font-size: 1.1rem; font-weight: 700; margin-top: 2px; }
.summary-item.chinese .value { color: var(--chinese); }
.summary-item.math .value { color: var(--math); }
.summary-item.english .value { color: var(--english); }

/* ======= 科目标签 ======= */
.subject-tabs {
  display: flex; margin: 0 12px; gap: 8px;
}
.subject-tab {
  flex: 1; padding: 10px; border: none; border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
  background: var(--border); color: var(--text-light);
}
.subject-tab.active { color: white; }
.subject-tab.chinese.active { background: var(--chinese); }
.subject-tab.math.active { background: var(--math); }
.subject-tab.english.active { background: var(--english); }
.subject-tab .check-icon { margin-left: 4px; font-size: 0.8rem; }

/* ======= 内容卡片 ======= */
.content-area {
  margin: 0 12px 80px;
}
.day-content {
  background: var(--card-bg); border-radius: 0 0 var(--radius) var(--radius);
  padding: 16px; box-shadow: var(--shadow);
  display: none;
}
.day-content.active { display: block; }

.content-section {
  margin-bottom: 20px;
}
.content-section:last-child { margin-bottom: 0; }

.section-title {
  font-size: 1rem; font-weight: 700; color: var(--text);
  padding-bottom: 8px; margin-bottom: 10px;
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.section-title .emoji { font-size: 1.2rem; }

/* 知识点卡片 */
.knowledge-card {
  background: var(--primary-light);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 10px;
  border-left: 4px solid var(--primary);
}
.knowledge-card .title { font-weight: 700; font-size: 0.9rem; margin-bottom: 6px; }
.knowledge-card .body { font-size: 0.85rem; color: var(--text); line-height: 1.7; }
.knowledge-card .highlight {
  background: #FFF3CD; padding: 2px 6px; border-radius: 4px;
  font-weight: 600;
}

/* 任务列表 */
.task-list { list-style: none; margin: 8px 0; }
.task-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px; margin-bottom: 6px;
  background: var(--bg); border-radius: var(--radius-sm);
  transition: all 0.2s;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}
.task-item:active { transform: scale(0.98); }
.task-item.done { opacity: 0.6; background: #F6FFED; }
.task-check {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  margin-top: 2px;
}
.task-item.done .task-check {
  background: var(--success); border-color: var(--success);
  color: white; font-size: 0.7rem;
}
.task-text { flex: 1; font-size: 0.88rem; line-height: 1.5; }
.task-text .tag {
  display: inline-block; font-size: 0.7rem; padding: 1px 8px;
  border-radius: 10px; margin-right: 6px; font-weight: 600;
}
.tag-read { background: #E8F0FE; color: var(--primary); }
.tag-write { background: #FEF0F0; color: var(--danger); }
.tag-copy { background: #FFF7E6; color: #D48806; }
.tag-recite { background: #F6FFED; color: var(--success); }
.tag-practice { background: #F0F0FF; color: #6B5CE7; }
.tag-video { background: #FFF0F6; color: #EB2F96; }
.tag-audio { background: #F0FFF4; color: var(--english); }

/* 练习区域 */
.practice-box {
  background: #FAFAFA;
  border-radius: var(--radius-sm); padding: 14px;
  margin: 8px 0;
  border: 1px dashed var(--border);
}
.practice-box .question {
  font-size: 0.9rem; font-weight: 600; margin-bottom: 8px;
}
.practice-box .answer-area {
  min-height: 60px; border: 1px solid var(--border);
  border-radius: 8px; padding: 10px;
  font-size: 0.85rem; color: var(--text-light);
  background: white;
}
.practice-box .hint {
  font-size: 0.78rem; color: var(--primary); margin-top: 6px;
  cursor: pointer;
}
.practice-box .answer-reveal {
  display: none; margin-top: 8px; padding: 10px;
  background: #F6FFED; border-radius: 8px;
  border-left: 3px solid var(--success);
  font-size: 0.85rem;
}

/* ======= 手写板 ======= */
.whiteboard-section { margin-top: 12px; }
.whiteboard-toolbar {
  display: flex; gap: 6px; align-items: center; padding: 8px 0;
  flex-wrap: wrap;
}
.whiteboard-toolbar button {
  padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
  background: white; font-size: 0.8rem; cursor: pointer;
}
.whiteboard-toolbar button.active { background: var(--primary); color: white; border-color: var(--primary); }
.whiteboard-toolbar button:active { transform: scale(0.95); }
.whiteboard-canvas {
  width: 100%; height: 240px; border: 2px solid var(--border);
  border-radius: var(--radius-sm); background: white;
  touch-action: none;
}
.whiteboard-canvas.math-board { height: 300px; }

/* ======= 音频播放器 ======= */
.audio-player {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; background: #F0FFF4; border-radius: var(--radius-sm);
  margin: 8px 0;
  border: 1px solid #C6F6D5;
}
.audio-player .play-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: none; background: var(--english); color: white;
  font-size: 1.2rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.audio-player .play-btn:active { transform: scale(0.9); }
.audio-player .audio-label { font-size: 0.85rem; flex: 1; }
.audio-player .audio-wave {
  height: 4px; background: #C6F6D5; border-radius: 2px;
  flex: 1; position: relative; overflow: hidden;
}
.audio-player .audio-wave .progress {
  height: 100%; background: var(--english); border-radius: 2px;
  width: 0; transition: width 0.1s;
}
.audio-player .duration { font-size: 0.75rem; color: var(--text-light); }

/* 录音按钮 */
.record-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; border: 2px solid var(--danger); border-radius: 25px;
  background: white; color: var(--danger); font-size: 0.85rem; font-weight: 600;
  cursor: pointer; margin: 8px 0;
}
.record-btn.recording { background: var(--danger); color: white; animation: pulse 1s infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* ======= 诗词卡片 ======= */
.poem-card {
  background: linear-gradient(135deg, #FFF5F5, #FFFAF0);
  border-radius: var(--radius-sm); padding: 16px;
  margin: 10px 0; text-align: center;
  border: 1px solid #FED7D7;
}
.poem-card .poem-title { font-size: 1.1rem; font-weight: 700; color: var(--chinese); }
.poem-card .poem-author { font-size: 0.8rem; color: var(--text-light); margin-bottom: 10px; }
.poem-card .poem-content { font-size: 0.9rem; line-height: 2; }
.poem-card .poem-translation { font-size: 0.8rem; color: var(--text-light); margin-top: 8px; 
  padding-top: 8px; border-top: 1px dashed #FED7D7; }

/* ======= 数学公式 ======= */
.math-formula {
  background: #F8F9FA; padding: 12px 16px; border-radius: var(--radius-sm);
  margin: 8px 0; text-align: center;
  font-size: 1.1rem; font-weight: 600; color: var(--math);
  font-family: "Times New Roman", serif;
}
.math-formula .explain {
  font-size: 0.8rem; font-weight: 400; color: var(--text-light);
  margin-top: 4px;
}
.math-example {
  background: #EBF8FF; padding: 12px; border-radius: var(--radius-sm);
  margin: 8px 0; border-left: 3px solid var(--math);
  font-size: 0.85rem; line-height: 1.8;
}
.math-example .step { color: var(--text-light); font-size: 0.8rem; margin-top: 4px; }

/* ======= 英语音标卡片 ======= */
.phonetic-card {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px; margin: 8px 0;
}
.phonetic-item {
  background: #F0FFF4; padding: 10px; border-radius: 8px; text-align: center;
  border: 1px solid #C6F6D5;
}
.phonetic-item .symbol { font-size: 1.5rem; font-weight: 700; color: var(--english); }
.phonetic-item .example { font-size: 0.8rem; color: var(--text-light); margin-top: 4px; }

/* ======= 进度面板 ======= */
.progress-panel {
  margin: 0 12px 12px;
  background: var(--card-bg); border-radius: var(--radius); padding: 14px;
  box-shadow: var(--shadow);
}
.progress-panel h3 { font-size: 0.9rem; margin-bottom: 8px; }
.progress-bar {
  height: 8px; background: var(--border); border-radius: 4px;
  overflow: hidden; margin: 4px 0;
}
.progress-bar .fill {
  height: 100%; border-radius: 4px; transition: width 0.5s ease;
}
.progress-bar .fill.chinese { background: var(--chinese); }
.progress-bar .fill.math { background: var(--math); }
.progress-bar .fill.english { background: var(--english); }
.progress-stats { font-size: 0.78rem; color: var(--text-light); margin-top: 4px; }

/* ======= 底部导航 ======= */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card-bg); border-top: 1px solid var(--border);
  display: flex; padding: 8px 0 env(safe-area-inset-bottom, 8px);
  z-index: 100;
}
.bottom-nav button {
  flex: 1; border: none; background: none;
  padding: 6px; font-size: 0.7rem;
  color: var(--text-light); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.bottom-nav button .icon { font-size: 1.3rem; }
.bottom-nav button.active { color: var(--primary); }

/* ======= 模态框 ======= */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 200;
  display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-content {
  background: var(--card-bg); border-radius: var(--radius) var(--radius) 0 0;
  width: 100%; max-height: 80vh; overflow-y: auto;
  padding: 20px 16px env(safe-area-inset-bottom, 16px);
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 40px; height: 4px; background: var(--border); border-radius: 2px;
  margin: 0 auto 12px;
}
.modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }

/* ======= 学习记录 ======= */
.record-card {
  background: var(--card-bg); border-radius: var(--radius-sm);
  padding: 12px; margin-bottom: 8px; border: 1px solid var(--border);
}
.record-card .date { font-size: 0.78rem; color: var(--text-light); }
.record-card .subjects { display: flex; gap: 6px; margin-top: 6px; }
.record-card .subj-tag {
  padding: 2px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 600;
}
.record-card .subj-tag.chinese { background: #FEF0F0; color: var(--chinese); }
.record-card .subj-tag.math { background: #EBF8FF; color: var(--math); }
.record-card .subj-tag.english { background: #F0FFF4; color: var(--english); }

/* ======= 响应式 ======= */
@media (min-width: 768px) {
  body { max-width: 800px; margin: 0 auto; }
  .header { border-radius: 0 0 var(--radius) var(--radius); }
}
@media (max-width: 374px) {
  html { font-size: 14px; }
}

/* ======= 打印 ======= */
@media print {
  .header, .bottom-nav, .whiteboard-section, .record-btn, .day-selector {
    display: none !important;
  }
  .day-content { display: block !important; page-break-after: always; }
  body { background: white; }
  .content-area { margin: 0; }
  .day-content { box-shadow: none; border: 1px solid #ddd; }
}

/* ======= 加载动画 ======= */
.loading { text-align: center; padding: 40px; color: var(--text-light); }
.spinner {
  width: 40px; height: 40px; border: 4px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ======= 空状态 ======= */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); }
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state .text { font-size: 0.9rem; }

/* ======= 音标关联拼音卡 ======= */
.phonetic-compare {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0;
}
.phonetic-compare .compare-item {
  padding: 10px; border-radius: 8px; text-align: center;
  background: #FFFBE6; border: 1px solid #FFE58F;
}
.phonetic-compare .compare-item .en { font-size: 1.3rem; font-weight: 700; color: var(--english); }
.phonetic-compare .compare-item .pinyin { font-size: 1rem; color: #D48806; margin-top: 4px; }
.phonetic-compare .compare-item .desc { font-size: 0.75rem; color: var(--text-light); margin-top: 4px; }

/* ======= 单词联想网络 ======= */
.word-web {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  margin: 10px 0; padding: 12px; background: #F0FFF4; border-radius: var(--radius-sm);
}
.word-web .web-node {
  padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;
  position: relative;
}
.word-web .web-node.root {
  background: var(--english); color: white; font-size: 1rem;
}
.word-web .web-node.branch {
  background: #C6F6D5; color: #276749;
}
.word-web .web-node.leaf {
  background: #E6FFFA; color: #234E52; border: 1px solid #B2F5EA;
}
.word-web .web-connector { font-size: 1.2rem; color: var(--english); align-self: center; }

/* ======= 图片占位 ======= */
.image-placeholder {
  background: linear-gradient(135deg, #E8F0FE, #F0E6FF);
  border-radius: var(--radius-sm); padding: 20px; text-align: center;
  margin: 10px 0; min-height: 100px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.image-placeholder .icon { font-size: 2rem; margin-bottom: 6px; }
.image-placeholder .hint { font-size: 0.8rem; color: var(--text-light); }

/* ======= 互动问答 ======= */
.quiz-card {
  background: white; border: 2px solid var(--border); border-radius: var(--radius-sm);
  padding: 14px; margin: 10px 0;
}
.quiz-card .question { font-weight: 600; font-size: 0.9rem; margin-bottom: 10px; }
.quiz-options { display: flex; flex-direction: column; gap: 6px; }
.quiz-option {
  padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px;
  font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
  background: white;
}
.quiz-option:active { transform: scale(0.98); }
.quiz-option.selected { border-color: var(--primary); background: var(--primary-light); }
.quiz-option.correct { border-color: var(--success); background: #F6FFED; }
.quiz-option.wrong { border-color: var(--danger); background: #FFF2F0; }
.quiz-option .check { float: right; }
.quiz-result { margin-top: 8px; font-size: 0.85rem; font-weight: 600; text-align: center; }
.quiz-result.correct { color: var(--success); }
.quiz-result.wrong { color: var(--danger); }

/* ======= Study Tip 提示 ======= */
.study-tip {
  background: linear-gradient(135deg, #FFFAF0, #FFF5F5);
  border: 1px solid #FED7AA; border-radius: var(--radius-sm);
  padding: 12px; margin: 8px 0;
  display: flex; align-items: flex-start; gap: 10px;
}
.study-tip .icon { font-size: 1.3rem; flex-shrink: 0; }
.study-tip .text { font-size: 0.82rem; line-height: 1.6; }
.study-tip .text .strong { font-weight: 700; }

</style>
<style>
﻿/* ========================================
   增强动画 & 可视化组件
   ======================================== */

/* --- 历史时间线 --- */
.timeline {
  position: relative; padding: 16px 0 16px 30px; margin: 12px 0;
}
.timeline::before {
  content: ""; position: absolute; left: 10px; top: 0; bottom: 0;
  width: 3px; background: linear-gradient(180deg, var(--chinese), #F6AD55, var(--primary));
  border-radius: 2px;
}
.timeline-item {
  position: relative; margin-bottom: 14px; padding-left: 16px;
  opacity: 0; transform: translateX(-10px);
  animation: slideIn 0.4s ease forwards;
}
.timeline-item:nth-child(1) { animation-delay: 0.1s; }
.timeline-item:nth-child(2) { animation-delay: 0.25s; }
.timeline-item:nth-child(3) { animation-delay: 0.4s; }
.timeline-item:nth-child(4) { animation-delay: 0.55s; }
.timeline-item:nth-child(5) { animation-delay: 0.7s; }
.timeline-item::before {
  content: ""; position: absolute; left: -22px; top: 6px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--chinese); border: 2px solid white; box-shadow: 0 0 0 2px var(--chinese);
}
.timeline-item .year {
  font-size: 0.75rem; font-weight: 700; color: var(--chinese);
  background: #FEF0F0; display: inline-block; padding: 1px 8px; border-radius: 8px;
  margin-bottom: 2px;
}
.timeline-item .desc {

<script>

var App = {
  currentDay: 1,

    this.bindEvents();
  },
  
  // 加载本地存储进度
  loadProgress: function() {
    try {
      this.progress = JSON.parse(localStorage.getItem("summerProgress")) || {};
    } catch(e) {
      this.progress = {};
    }
  },
  
  saveProgress: function() {
    localStorage.setItem("summerProgress", JSON.stringify(this.progress));
  },
  
  // 获取某天的完成状态
  getDayStatus: function(day) {
    var p = this.progress[day];
    if (!p) return {chinese:[], math:[], english:[]};
    return p;
  },
  
  toggleTask: function(day, subject, taskIndex) {
    if (!this.progress[day]) this.progress[day] = {chinese:[], math:[], english:[]};
    var tasks = this.progress[day][subject];
    var idx = tasks.indexOf(taskIndex);
    if (idx > -1) tasks.splice(idx, 1);
    else tasks.push(taskIndex);
    this.saveProgress();
    this.renderDay(day);
    this.renderProgress();
    this.renderDaySelector();
  },
  
  // 渲染日期选择器
  renderDaySelector: function() {
    var html = "";
    for (var i = 1; i <= 30; i++) {
      var cls = "day-dot";
      if (i === this.currentDay) cls += " active";
      var dayData = this.getDayStatus(i);
      var totalDone = dayData.chinese.length + dayData.math.length + dayData.english.length;
      if (totalDone > 0) cls += " completed";
      html += "<div class=\"" + cls + "\" data-day=\"" + i + "\">" + i + "</div>";
    }
    document.getElementById("daySelector").innerHTML = html;
  },
  
  // 渲染某一天的内容
  renderDay: function(dayNum) {
    this.currentDay = dayNum;
    var dayData = this.getDayData(dayNum);
    if (!dayData) {
      document.getElementById("contentArea").innerHTML = "<div class='empty-state'><div class='icon'>📚</div><div class='text'>内容加载中...</div></div>";
      return;
    }
    
    // 更新顶部信息
    document.getElementById("dayNum").textContent = "第" + dayNum + "天";
    document.getElementById("dayDate").textContent = dayData.date + " " + dayData.weekday;
    document.getElementById("dayDifficulty").textContent = "难度：" + dayData.difficulty;
    document.getElementById("dayFocus").textContent = "今日重点：" + dayData.focus;
    
    // 渲染摘要条
    this.renderSummary(dayData);
    
    // 渲染科目标签
    this.renderSubjectTabs(dayData);
    
    // 渲染当前科目的内容
    this.renderSubjectContent(dayData, this.currentSubject);
    
    // 滚动到顶部
    window.scrollTo({top: 0, behavior: "smooth"});

  getDayData: function(day) {

  renderSubjectContent: function(dayData, subject) {
    var content = dayData.subjects[subject];
    if (!content) return;
    
    var title = content.title;
    var preview = content.preview || "";
    var sections = content.sections;
    
    // 构建标题区
    var html = "<div class='content-section'><div class='section-title'><span>📖</span>" + title + "</div>";

    // 构建各区内容
    for (var i = 0; i < sections.length; i++) {
      html += this.renderSection(sections[i], dayData.day, subject, i);
    }
    
    // 添加手写板
    html += this.renderWhiteboard(subject);
    
    document.getElementById("dayContent").innerHTML = html;
    document.getElementById("dayContent").className = "day-content active";
    
    // 重新绑定事件

  renderSection: function(section, day, subject, sectionIdx) {

      case "knowledge":

      case "phonetic":

          if (qData.answer) html += "<div class='hint' style='color:#52C41A;' onclick=\"this.nextElementSibling.style.display='block'\">✅ 查看答案</div><div class='answer-reveal'><strong>答案：</strong>" + qData.answer + "</div>";

        html += "<div class='section-title'><span>" + (section.title.includes("测验")?"📝":"❓") + "</span>" + (section.title || "小测验") + "</div>";

          html += "<div class='quiz-card' data-quiz='" + qz + "'>";
          html += "<div class='question'>" + q.q + "</div>";

      case "task":

        var dayStatus = this.progress[day] || {};
        var doneTasks = dayStatus[subject] || [];
        var taskIdx = 0;
        for (var sc = 0; sc < sectionIdx; sc++) {
          if (this.getDayData(day) && this.getDayData(day).subjects[subject].sections[sc].type === "task") {
            taskIdx++;
          }
        }
        // 重新计算
        var offset = 0;
        for (var sc2 = 0; sc2 < sectionIdx; sc2++) {
          var s = this.getDayData(day);
          if (s && s.subjects[subject].sections[sc2].type === "task") {
            offset += s.subjects[subject].sections[sc2].tasks.length;
          }
        }
        for (var t = 0; t < section.tasks.length; t++) {
          var task = section.tasks[t];
          var isDone = doneTasks.indexOf(offset + t) > -1;
          html += "<li class='task-item" + (isDone ? " done" : "") + "' data-day='" + day + "' data-subject='" + subject + "' data-idx='" + (offset + t) + "'>";
          html += "<div class='task-check'>" + (isDone ? "✓" : "") + "</div>";
          html += "<div class='task-text'><span class='tag tag-" + task.tag + "'>" + this.getTagName(task.tag) + "</span>" + task.text + "</div>";
          html += "</li>";
        }
        html += "</ul>";
        break;
    }
    
    html += "</div>";
    return html;
  },
  
  getTagName: function(tag) {

  },
  
  renderWhiteboard: function(subject) {

    return "<div class='whiteboard-section content-section'><div class='section-title'><span>✍️</span>手写板（iPad可用笔书写）</div>" +

  bindSectionEvents: function(day, subject) {

  initWhiteboard: function() {
    var canvas = document.getElementById("whiteboard");
    if (!canvas) return;
    
    var ctx = canvas.getContext("2d");
    var drawing = false;
    var color = "#2D3748";
    var lineWidth = 3;
    
    function resize() {
      var rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
    }
    resize();
    window.addEventListener("resize", resize);
    
    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      var clientX = e.touches ? e.touches[0].clientX : e.clientX;
      var clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {x: clientX - rect.left, y: clientY - rect.top};
    }
    
    function startDraw(e) {
      e.preventDefault();
      drawing = true;
      var pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    }
    
    function draw(e) {
      e.preventDefault();
      if (!drawing) return;
      var pos = getPos(e);
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    }
    
    function stopDraw(e) {
      drawing = false;
      ctx.beginPath();
    }
    
    canvas.addEventListener("mousedown", startDraw);
    canvas.addEventListener("mousemove", draw);
    canvas.addEventListener("mouseup", stopDraw);
    canvas.addEventListener("mouseleave", stopDraw);
    canvas.addEventListener("touchstart", startDraw, {passive: false});
    canvas.addEventListener("touchmove", draw, {passive: false});
    canvas.addEventListener("touchend", stopDraw);
    
    // 颜色切换
    var colorBtns = document.querySelectorAll(".whiteboard-toolbar button[data-color]");
    for (var i = 0; i < colorBtns.length; i++) {
      colorBtns[i].addEventListener("click", function() {
        var siblings = this.parentElement.querySelectorAll("button[data-color]");
        for (var j = 0; j < siblings.length; j++) siblings[j].className = "";
        this.className = "active";
        color = this.getAttribute("data-color");
      });
    }
    
    // 清除
    var clearBtn = document.getElementById("clearBoard");
    if (clearBtn) {
      clearBtn.addEventListener("click", function() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      });
    }
  },
  
  renderProgress: function() {
    var totalTasks = 0;
    var totalDone = 0;
    var chineseDone = 0, mathDone = 0, englishDone = 0;
    var chineseTotal = 0, mathTotal = 0, englishTotal = 0;
    
    for (var d = 0; d < COURSE_DATA.length; d++) {
      var day = COURSE_DATA[d];
      if (!day) continue;
      var subjects = ["chinese","math","english"];
      for (var s = 0; s < subjects.length; s++) {
        var subj = subjects[s];
        var sections = day.subjects[subj].sections;
        for (var sec = 0; sec < sections.length; sec++) {
          if (sections[sec].type === "task" && sections[sec].tasks) {
            var cnt = sections[sec].tasks.length;
            totalTasks += cnt;
            if (subj === "chinese") chineseTotal += cnt;
            else if (subj === "math") mathTotal += cnt;
            else if (subj === "english") englishTotal += cnt;
          }
        }
      }
      var dayP = this.progress[day.day];
      if (dayP) {
        for (var s2 = 0; s2 < subjects.length; s2++) {
          var subj2 = subjects[s2];
          var done = (dayP[subj2] || []).length;
          totalDone += done;
          if (subj2 === "chinese") chineseDone += done;
          else if (subj2 === "math") mathDone += done;
          else if (subj2 === "english") englishDone += done;
        }
      }
    }
    
    var pct = totalTasks > 0 ? Math.round(totalDone / totalTasks * 100) : 0;
    var chPct = chineseTotal > 0 ? Math.round(chineseDone / chineseTotal * 100) : 0;
    var maPct = mathTotal > 0 ? Math.round(mathDone / mathTotal * 100) : 0;
    var enPct = englishTotal > 0 ? Math.round(englishDone / englishTotal * 100) : 0;
    
    document.getElementById("progressPanel").innerHTML =
      "<h3>📊 总学习进度</h3>" +
      "<div style='margin:6px 0'><div style='display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:2px;'><span>语文</span><span>" + chineseDone + "/" + chineseTotal + "</span></div><div class='progress-bar'><div class='fill chinese' style='width:" + chPct + "%'></div></div></div>" +
      "<div style='margin:6px 0'><div style='display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:2px;'><span>数学</span><span>" + mathDone + "/" + mathTotal + "</span></div><div class='progress-bar'><div class='fill math' style='width:" + maPct + "%'></div></div></div>" +
      "<div style='margin:6px 0'><div style='display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:2px;'><span>英语</span><span>" + englishDone + "/" + englishTotal + "</span></div><div class='progress-bar'><div class='fill english' style='width:" + enPct + "%'></div></div></div>" +
      "<div class='progress-stats'>总进度：" + totalDone + "/" + totalTasks + "（" + pct + "%）</div>";
  },
  
  switchSubject: function(subject) {
    this.currentSubject = subject;
    var dayData = this.getDayData(this.currentDay);
    if (dayData) {
      this.renderSubjectTabs(dayData);
      this.renderSubjectContent(dayData, subject);
    }
  },
  
  goToDay: function(day) {
    if (day < 1 || day > 30) return;
    this.currentDay = day;
    this.renderDay(day);
    this.renderDaySelector();
  },
  
  bindEvents: function() {
    var self = this;
    
    // 日期选择器点击（事件委托）
    document.getElementById("daySelector").addEventListener("click", function(e) {
      var dot = e.target.closest(".day-dot");
      if (dot) {
        var day = parseInt(dot.getAttribute("data-day"));
        self.goToDay(day);
      }

      if (tab) {
        self.switchSubject(tab.getAttribute("data-subject"));
      }
    });
    
    // 前一天
    document.getElementById("prevDay").addEventListener("click", function() {
      self.goToDay(self.currentDay - 1);
    });
    
    // 后一天
    document.getElementById("nextDay").addEventListener("click", function() {
      self.goToDay(self.currentDay + 1);
    });
    
    // 进度面板
    document.getElementById("showProgress").addEventListener("click", function() {
      var modal = document.getElementById("progressModal");
      modal.className = "modal-overlay show";
    });
    
    // 关闭模态框
    document.getElementById("progressModal").addEventListener("click", function(e) {
      if (e.target === this) this.className = "modal-overlay";
    });
  }
};

  window.speechSynthesis.cancel();
  var utter = new SpeechSynthesisUtterance(text);

  utter.rate = rate || 0.85;
  utter.pitch = 1;
  window.speechSynthesis.speak(utter);
};

      html += "<div class='subtitle'>" + (section.hint || "点击了解如何观看") + "</div>";
      html += "</div>";
      if (section.description) html += "<div style='padding:8px 12px;background:#2D3748;border-top:1px solid #4A5568;font-size:0.75rem;color:#A0AEC0;'>" + section.description + "</div>";
      html += "</div>";
      break;
    
    // 柱状图
    case "bar-chart":
      html += "<div class='section-title'><span>📊</span>" + (section.title || "数据图示") + "</div>";
      html += "<div class='chart-container'><div class='chart-title'>" + section.chartTitle + "</div>";
      html += "<div class='bar-chart'>";
      var maxVal = 0;
      for (var i = 0; i < section.data.length; i++) {
        if (section.data[i].value > maxVal) maxVal = section.data[i].value;
      }
      for (var i = 0; i < section.data.length; i++) {
        var d = section.data[i];
        var h = maxVal > 0 ? Math.round(d.value / maxVal * 100) : 0;
        html += "<div class='bar-item'><div class='bar' style='height:" + h + "px;background:" + (d.color || "#4A90D9") + "'><div class='val'>" + d.value + "</div></div><div class='label'>" + d.label + "</div></div>";
      }
      html += "</div></div>";
      break;
    
    // 圆环图
    case "donut-chart":
      html += "<div class='section-title'><span>📊</span>" + (section.title || "数据图示") + "</div>";
      html += "<div class='chart-container'><div class='chart-title'>" + section.chartTitle + "</div>";
      html += "<div class='donut-container'>";
      var total = 0;
      for (var i = 0; i < section.data.length; i++) total += section.data[i].value;
      var acc = 0;
      html += '<svg width="140" height="140" viewBox="0 0 140 140">';
      for (var i = 0; i < section.data.length; i++) {
        var pct = section.data[i].value / total;
        var angle = pct * 360;
        var startAngle = acc * 360;
        acc += pct;
        // Simple arc approximation
        var r = 55, cx = 70, cy = 70;
        var sRad = (startAngle - 90) * Math.PI / 180;
        var eRad = (startAngle + angle - 90) * Math.PI / 180;
        var x1 = cx + r * Math.cos(sRad);
        var y1 = cy + r * Math.sin(sRad);
        var x2 = cx + r * Math.cos(eRad);
        var y2 = cy + r * Math.sin(eRad);
        var large = angle > 180 ? 1 : 0;
        // Inner circle to create donut
        var innerR = 30;
        var ix1 = cx + innerR * Math.cos(eRad);
        var iy1 = cy + innerR * Math.sin(eRad);
        var ix2 = cx + innerR * Math.cos(sRad);
        var iy2 = cy + innerR * Math.sin(sRad);
        var path = "M " + x1 + " " + y1 + " A " + r + " " + r + " 0 " + large + " 1 " + x2 + " " + y2 +
                   " L " + ix1 + " " + iy1 + " A " + innerR + " " + innerR + " 0 " + large + " 0 " + ix2 + " " + iy2 + " Z";
        html += '<path d="' + path + '" fill="' + (section.data[i].color || "#4A90D9") + '" opacity="0.9"><animate attributeName="opacity" from="0" to="0.9" dur="0.5s" begin="' + (i * 0.15) + 's"/></path>';
      }
      html += '</svg>';
      html += "<div class='center-text'>" + (section.centerText || "") + "</div></div>";
      html += "<div style='display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:0.75rem;'>";
      for (var i = 0; i < section.data.length; i++) {
        html += "<span><span style='display:inline-block;width:10px;height:10px;border-radius:2px;background:" + section.data[i].color + ";margin-right:4px;'></span>" + section.data[i].label + "</span>";
      }
      html += "</div></div>";
      break;
    
    // 数轴动画
    case "number-line":
      html += "<div class='section-title'><span>📏</span>" + (section.title || "数轴演示") + "</div>";
      html += "<div class='number-line-container'><div class='number-line'>";
      var min = section.min || -5;
      var max = section.max || 5;
      var step = section.step || 1;
      var range = max - min;
      for (var v = min; v <= max; v += step) {
        var pct = ((v - min) / range) * 100;
        html += "<div class='tick' style='left:" + pct + "%'></div>";
        html += "<div class='tick-label' style='left:" + pct + "%'>" + v + "</div>";
      }
      if (section.animate !== false) {
        html += "<div class='moving-dot' style='animation-duration:" + (section.duration || 4) + "s'></div>";
        html += "<div class='dot-glow'></div>";
      }
      html += "</div><div style='text-align:center;font-size:0.7rem;color:var(--text-light);margin-top:24px;'>" + (section.caption || "← 负数 | 正数 →") + "</div></div>";
      break;

    // 绝对值动画
    case "abs-demo":
      html += "<div class='section-title'><span>📏</span>" + (section.title || "绝对值演示") + "</div>";
      html += "<div class='abs-demo'><div class='line'></div>";
      html += "<div class='point pos'>" + (section.pos || "5") + "</div>";
      html += "<div class='point zero'>0</div>";
      html += "<div class='point neg'>" + (section.neg || "-5") + "</div>";
      html += "<div class='arrow-line left'></div><div class='arrow-line right'></div>";
      html += "<div class='dist-label' style='left:38%;color:var(--danger);'>距离=" + (Math.abs(section.neg) || "5") + "</div>";
      html += "<div class='dist-label' style='right:38%;color:var(--math);'>距离=" + (section.pos || "5") + "</div>";
      html += "<div style='position:absolute;bottom:0;font-size:0.75rem;color:var(--text-light);text-align:center;width:100%;'>|" + (section.neg || "-5") + "| = |" + (section.pos || "5") + "| = " + (Math.abs(section.pos) || "5") + "</div>";
      html += "</div>";
      break;
    
    // 解答步骤
    case "step-reveal":
      html += "<div class='section-title'><span>📝</span>" + (section.title || "解题步骤") + "</div>";
      html += "<div class='step-reveal'>";
      if (section.question) html += "<div style='font-weight:700;font-size:0.9rem;margin-bottom:8px;'>" + section.question + "</div>";
      for (var i = 0; i < section.steps.length; i++) {
        html += "<div class='step'><span class='step-num'>" + (i+1) + "</span><span class='step-text'>" + section.steps[i].text + "</span>";
        if (section.steps[i].result) html += "<div class='step-result'>→ " + section.steps[i].result + "</div>";
        html += "</div>";
      }
      html += "</div>";
      break;
    
    // 英语音标增强卡片
    case "phonetic-enhanced":
      html += "<div class='section-title'><span>🎵</span>" + (section.title || "音标学习") + "</div>";
      html += "<div class='phonetic-enhanced'>";
      for (var i = 0; i < section.items.length; i++) {
        var item = section.items[i];
        html += "<div class='phonetic-card-enhanced' onclick=\"App.speak('" + item.example.split('/')[1] + "',0.8)\">";
        html += "<span class='symbol'>" + item.symbol + "</span>";
        html += "<div class='example'>" + item.example + "</div>";
        if (item.pinyin) html += "<div class='pinyin-compare'>🔊 " + item.pinyin + "</div>";
        html += "<div class='play-hint'>👆 点击听发音</div>";
        html += "</div>";
      }
      html += "</div>";
      break;
    
    // 音标对比表（英语 vs 拼音）
    case "phonetic-compare":
      html += "<div class='section-title'><span>🔤</span>" + (section.title || "音标 vs 拼音") + "</div>";
      html += "<table class='phonetic-compare-table'>";
      html += "<tr><th>英语音标</th><th>发音</th><th>≈ 汉语拼音</th><th>播放</th></tr>";
      for (var i = 0; i < section.items.length; i++) {
        var item = section.items[i];
        html += "<tr><td class='en-symbol'>" + item.symbol + "</td>";
        html += "<td style='font-size:0.8rem;'>" + item.example + "</td>";
        html += "<td class='cn-symbol'>" + (item.pinyin || "—") + "</td>";
        html += "<td><button class='play-btn-sm' onclick=\"App.speak('" + item.example.split('/')[1].split('/')[0] + "',0.8)\">▶</button></td></tr>";
      }
      html += "</table>";
      html += "<div style='font-size:0.75rem;color:var(--text-light);text-align:center;margin-top:4px;'>💡 英语音标和汉语拼音的发音位置几乎一样，用拼音的方法读音标就能快速掌握！</div>";
      break;
    
    // 词根联想网络
    case "word-tree":
      html += "<div class='section-title'><span>🌳</span>" + (section.title || "词根联想网络") + "</div>";
      html += "<div class='word-tree'>";
      html += "<div class='root'>" + section.root + "</div>";
      html += "<div style='font-size:0.8rem;color:#38A169;font-weight:600;'>→ " + (section.rootMeaning || "") + " ←</div>";
      html += "<div class='branches'>";
      for (var i = 0; i < section.branches.length; i++) {
        var b = section.branches[i];
        html += "<div class='branch-card' onclick=\"App.speak('" + b.word + "',0.85)\">";
        html += "<div class='word'>" + b.word + "</div>";
        html += "<div class='meaning'>" + b.meaning + "</div>";
        html += "<div class='connector'>" + b.connection + "</div>";
        html += "</div>";
      }
      html += "</div></div>";
      break;
    
    // 记忆口诀
    case "mnemonic":
      html += "<div class='section-title'><span>💡</span>" + (section.title || "记忆口诀") + "</div>";
      html += "<div class='mnemonic-card'><div class='title'>" + section.label + "</div>";
      html += "<div class='rhyme'>" + section.rhyme + "</div></div>";
      break;
    
    // 趣味知识
    case "fun-fact":
      html += "<div class='fun-fact'><div class='icon'>" + (section.icon || "💡") + "</div>";
      html += "<div class='content'>" + (section.label ? "<strong>" + section.label + "</strong><br>" : "") + section.body + "</div></div>";
      break;
    
    // 口语练习面板
    case "speak-panel":
      html += "<div class='section-title'><span>🗣️</span>" + (section.title || "口语练习") + "</div>";
      html += "<div class='speak-panel'>";
      html += "<div class='phrase'>" + section.phrase + "</div>";
      if (section.pinyinLike) html += "<div class='pinyin-like'>" + section.pinyinLike + "</div>";
      html += "<button class='play-big' onclick=\"App.speak('" + section.phrase + "'," + (section.rate || "0.85") + ")\">▶</button>";
      if (section.tip) html += "<div class='tip'>" + section.tip + "</div>";
      html += "</div>";
      break;
    
    // 翻转卡片
    case "flip-card":
      html += "<div class='section-title'><span>🃏</span>" + (section.title || "互动记忆") + "</div>";
      html += "<div class='flip-card' onclick=\"this.classList.toggle('flipped')\"><div class='flip-card-inner'>";
      html += "<div class='flip-card-front'><div style='font-size:1rem;font-weight:600;'>" + section.front + "</div><div class='hint-text'>👆 点击翻转</div></div>";
      html += "<div class='flip-card-back'><div class='answer-text'>" + section.back + "</div>";
      if (section.backDetail) html += "<div style='font-size:0.8rem;margin-top:4px;'>" + section.backDetail + "</div>";
      html += "</div></div></div>";
      break;
  }
  
  html += "</div>";
  return html;
};

// --- 注入到主渲染流程 ---
App.renderSectionOriginal = App.renderSection;
App.renderSection = function(section, day, subject, sectionIdx) {
  // 检查是否是增强类型
  var enhancedTypes = ["timeline","visual-context","video","bar-chart","donut-chart",
                       "number-line","abs-demo","step-reveal","phonetic-enhanced",
                       "phonetic-compare","word-tree","mnemonic","fun-fact","speak-panel","flip-card"];
  if (enhancedTypes.indexOf(section.type) > -1) {
    return this.renderEnhancedSection(section);
  }
  return this.renderSectionOriginal(section, day, subject, sectionIdx);
};

// --- 视频信息提示 ---
App.showVideoInfo = function(url, search) {
  var msg = "🎬 推荐搜索内容\n\n";
  if (search) msg += "建议在B站/YouTube搜索：\n【" + search + "】\n\n";
  if (url) msg += "推荐链接：\n" + url + "\n\n";
  msg += "💡 提示：可以请家长协助在平板上搜索相关学习视频，边看边在App上完成学习任务。";
  alert(msg);
};

<script>
﻿/* ========================================
   自习追踪系统 v2.0
   功能：三阶段打卡、录音、错题本、报告
   ======================================== */
var StudyTracker = {
  // 数据存储键
  STORAGE_KEY: "summerStudyTracker",
  
  // 初始化
  init: function() {
    this.load();
    this.recordingData = {}; // 临时存储录音blob
    this.mediaRecorder = null;
    this.recordingStream = null;
    return this;
  },
  
  // 加载数据
  load: function() {
    try {
      var raw = localStorage.getItem(this.STORAGE_KEY);
      this.data = raw ? JSON.parse(raw) : {};
    } catch(e) {
      this.data = {};
    }
    // 确保结构完整
    if (!this.data.tasks) this.data.tasks = {};
    if (!this.data.errors) this.data.errors = {};
    if (!this.data.quizResults) this.data.quizResults = {};
    if (!this.data.sessions) this.data.sessions = {};
    if (!this.data.recordings) this.data.recordings = {};
  },
  
  // 保存数据
  save: function() {
    try {
      localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.data));
    } catch(e) {
      console.warn("存储失败:", e);
    }
  },
  
  // ========== 三阶段任务追踪 ==========
  
  // 获取任务的三阶段状态
  getTaskStage: function(day, subject, taskIdx) {
    var key = day + "_" + subject + "_" + taskIdx;
    return (this.data.tasks[key]) || {review:false, learn:false, practice:false, time:{}};
  },
  
  // 切换某个阶段的状态
  toggleStage: function(day, subject, taskIdx, stage) {
    var key = day + "_" + subject + "_" + taskIdx;
    if (!this.data.tasks[key]) {
      this.data.tasks[key] = {review:false, learn:false, practice:false, time:{}};
    }
    this.data.tasks[key][stage] = !this.data.tasks[key][stage];
    this.data.tasks[key].time[stage] = this.data.tasks[key][stage] ? new Date().toISOString() : null;
    this.save();
    return this.data.tasks[key][stage];
  },
  
  // 检查任务是否全部完成
  isTaskComplete: function(day, subject, taskIdx) {
    var t = this.getTaskStage(day, subject, taskIdx);
    return t.review && t.learn && t.practice;
  },
  
  // 获取某天某科的任务进度
  getSubjectProgress: function(day, subject, totalTasks) {
    var done = 0;
    for (var i = 0; i < totalTasks; i++) {
      if (this.isTaskComplete(day, subject, i)) done++;
    }
    return done;
  },
  
  // ========== 录音功能 ==========
  
  // 开始录音
  startRecording: function(type, taskKey, callback) {
    var self = this;
    var constraints = type === "video" 
      ? {audio: true, video: {facingMode: "user", width: {ideal: 320}, height: {ideal: 240}}}
      : {audio: true};
    
    navigator.mediaDevices.getUserMedia(constraints).then(function(stream) {
      self.recordingStream = stream;
      var options = type === "video" ? {mimeType: 'video/webm'} : {mimeType: 'audio/webm'};
      // 兼容不同浏览器
      try {
        self.mediaRecorder = new MediaRecorder(stream, options);
      } catch(e) {
        self.mediaRecorder = new MediaRecorder(stream);
      }
      
      var chunks = [];
      self.mediaRecorder.ondataavailable = function(e) {
        if (e.data.size > 0) chunks.push(e.data);
      };
      self.mediaRecorder.onstop = function() {
        var blob = new Blob(chunks, {type: type === "video" ? 'video/webm' : 'audio/webm'});
        var url = URL.createObjectURL(blob);
        if (!self.recordingData[taskKey]) self.recordingData[taskKey] = {};
        self.recordingData[taskKey][type] = {blob: blob, url: url, time: new Date().toISOString()};
        // 记录到data
        if (!self.data.recordings[taskKey]) self.data.recordings[taskKey] = {};
        self.data.recordings[taskKey][type] = {time: new Date().toISOString(), size: blob.size};
        self.save();
        // 停止所有轨道
        stream.getTracks().forEach(function(t) { t.stop(); });
        if (callback) callback(url, blob);
      };
      
      self.mediaRecorder.start();
      // 每3秒保存一次片段（防止丢失）
      self.mediaRecorder.timer = setInterval(function() {
        if (self.mediaRecorder && self.mediaRecorder.state === "recording") {
          self.mediaRecorder.requestData();
        }
      }, 3000);
      
    }).catch(function(err) {
      alert("无法访问麦克风/摄像头：" + err.message + "\n请在浏览器设置中允许访问。");
      if (callback) callback(null, null);
    });
  },
  
  // 停止录音
  stopRecording: function() {
    if (this.mediaRecorder && this.mediaRecorder.state === "recording") {
      clearInterval(this.mediaRecorder.timer);
      this.mediaRecorder.stop();
    }
    // 确保流被关闭
    if (this.recordingStream) {
      this.recordingStream.getTracks().forEach(function(t) { t.stop(); });
      this.recordingStream = null;
    }
  },
  
  // 检查是否在录音中
  isRecording: function() {
    return this.mediaRecorder && this.mediaRecorder.state === "recording";
  },
  
  // 获取录音URL
  getRecordingUrl: function(taskKey, type) {
    if (this.recordingData[taskKey] && this.recordingData[taskKey][type]) {
      return this.recordingData[taskKey][type].url;
    }
    return null;
  },
  
  // ========== 错题追踪 ==========
  
  // 记录错题
  recordError: function(day, subject, quizIdx, question, wrongAnswer, correctAnswer) {
    var key = day + "_" + subject;
    if (!this.data.errors[key]) this.data.errors[key] = [];
    this.data.errors[key].push({
      quizIdx: quizIdx,
      question: question,
      wrongAnswer: wrongAnswer,
      correctAnswer: correctAnswer,
      time: new Date().toISOString(),
      reviewed: false
    });
    this.save();
  },
  
  // 获取某天某科的错题
  getErrors: function(day, subject) {
    var key = day + "_" + subject;
    return this.data.errors[key] || [];
  },
  
  // 标记错题已复习
  markErrorReviewed: function(day, subject, errorIdx) {
    var key = day + "_" + subject;
    if (this.data.errors[key] && this.data.errors[key][errorIdx]) {
      this.data.errors[key][errorIdx].reviewed = true;
      this.save();
    }
  },
  
  // ========== 学习报告 ==========
  
  // 生成单日报告
  generateDayReport: function(day) {
    var dayData = App.getDayData(day);
    if (!dayData) return null;
    
    var report = {
      day: day,
      date: dayData.date,
      difficulty: dayData.difficulty,
      focus: dayData.focus,
      subjects: {},
      totalTasks: 0,
      completedTasks: 0,
      totalErrors: 0,
      reviewedErrors: 0,
      recordings: 0,
      studyTime: 0
    };
    
    var subs = ["chinese","math","english"];
    var subjNames = {chinese:"语文", math:"数学", english:"英语"};
    
    for (var s = 0; s < subs.length; s++) {
      var subj = subs[s];
      var sections = dayData.subjects[subj].sections;
      var taskCount = 0;
      var stages = {review:0, learn:0, practice:0};
      var completed = 0;
      
      // 计算任务
      for (var sec = 0; sec < sections.length; sec++) {
        if (sections[sec].type === "task" && sections[sec].tasks) {
          for (var t = 0; t < sections[sec].tasks.length; t++) {
            var idx = this.getGlobalTaskIndex(day, sections, sec, t);
            var stage = this.getTaskStage(day, subj, idx);
            if (stage.review) stages.review++;
            if (stage.learn) stages.learn++;
            if (stage.practice) stages.practice++;
            if (this.isTaskComplete(day, subj, idx)) completed++;
            taskCount++;
          }
        }
      }
      
      report.totalTasks += taskCount;
      report.completedTasks += completed;
      
      // 错题
      var errors = this.getErrors(day, subj);
      report.totalErrors += errors.length;
      for (var e = 0; e < errors.length; e++) {
        if (errors[e].reviewed) report.reviewedErrors++;
      }
      
      // 录音
      for (var sec2 = 0; sec2 < sections.length; sec2++) {
        if (sections[sec2].type === "task" && sections[sec2].tasks) {
          for (var t2 = 0; t2 < sections[sec2].tasks.length; t2++) {
            var idx2 = this.getGlobalTaskIndex(day, sections, sec2, t2);
            var rKey = day + "_" + subj + "_" + idx2;
            if (this.data.recordings[rKey]) {
              report.recordings += Object.keys(this.data.recordings[rKey]).length;
            }
          }
        }
      }
      
      report.subjects[subj] = {
        name: subjNames[subj],
        tasks: taskCount,
        completed: completed,
        stages: stages,
        errors: errors.length,
        reviewedErrors: errors.filter(function(e){return e.reviewed}).length
      };
    }
    
    return report;
  },
  
  // 获取全局任务索引
  getGlobalTaskIndex: function(day, sections, sectionIdx, taskIdx) {
    var offset = 0;
    for (var i = 0; i < sectionIdx; i++) {
      if (sections[i].type === "task" && sections[i].tasks) {
        offset += sections[i].tasks.length;
      }
    }
    return offset + taskIdx;
  },
  
  // ========== 统计方法 ==========
  
  getOverallStats: function() {
    var stats = {daysDone:0, totalTasks:0, completedTasks:0, errors:0, reviewedErrors:0, recordings:0};
    
    for (var d = 0; d < COURSE_DATA.length; d++) {
      var day = COURSE_DATA[d];
      if (!day) continue;
      var report = this.generateDayReport(day.day);
      if (report) {
        stats.totalTasks += report.totalTasks;
        stats.completedTasks += report.completedTasks;
        stats.errors += report.totalErrors;
        stats.reviewedErrors += report.reviewedErrors;
        stats.recordings += report.recordings;
        if (report.completedTasks >= report.totalTasks && report.totalTasks > 0) {
          stats.daysDone++;
        }
      }
    }
    return stats;
  }
};

// 初始化
StudyTracker.init();

</script>
<script>
﻿/* ========================================
   追踪UI v2.0 - 三阶段打卡、录音、错题本、报告
   ======================================== */

// ---------- 增强任务渲染 ----------
// 替换App.renderSection中的task类型渲染
App.renderTaskEnhanced = function(section, day, subject, sectionIdx) {
  var offset = 0;
  var dayData = App.getDayData(day);
  if (!dayData) return "";
  var sections = dayData.subjects[subject].sections;
  for (var i = 0; i < sectionIdx; i++) {
    if (sections[i].type === "task" && sections[i].tasks) {
      offset += sections[i].tasks.length;
    }
  }
  
  var html = "<div class='content-section'>";
  html += "<div class='section-title'><span>✅</span>" + (section.title || "任务清单") + "</div>";
  
  // 阶段说明
  html += "<div style='display:flex;gap:6px;margin-bottom:8px;font-size:0.72rem;color:var(--text-light);'>" +
    "<span style='background:#E8F0FE;padding:2px 8px;border-radius:8px;'>📖 温习</span>" +
    "<span style='background:#FEF0F0;padding:2px 8px;border-radius:8px;'>✏️ 学习</span>" +
    "<span style='background:#F6FFED;padding:2px 8px;border-radius:8px;'>✅ 练习</span>" +
    "<span style='background:#F0F0FF;padding:2px 8px;border-radius:8px;'>🎤 录音</span>" +
    "</div>";
  
  html += "<ul class='task-list'>";
  
  for (var t = 0; t < section.tasks.length; t++) {
    var task = section.tasks[t];
    var taskIdx = offset + t;
    var stage = StudyTracker.getTaskStage(day, subject, taskIdx);
    var isComplete = StudyTracker.isTaskComplete(day, subject, taskIdx);
    
    html += "<li class='task-item-enhanced' style='background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;'>";
    
    // 任务文本
    html += "<div style='display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;'>";
    html += "<span class='tag tag-" + task.tag + "' style='flex-shrink:0;'>" + App.getTagName(task.tag) + "</span>";
    html += "<span style='font-size:0.88rem;line-height:1.5;flex:1;'>" + task.text + "</span>";
    if (isComplete) html += "<span style='color:var(--success);font-size:0.8rem;flex-shrink:0;'>✅</span>";
    html += "</div>";
    
    // 三阶段按钮
    html += "<div style='display:flex;gap:4px;flex-wrap:wrap;'>";
    
    // 温习阶段
    html += "<button class='stage-btn " + (stage.review ? "done" : "") + "' data-day='" + day + "' data-subject='" + subject + "' data-idx='" + taskIdx + "' data-stage='review' style='" + this.stageBtnStyle(stage.review, "#E8F0FE","#4A90D9") + "'>📖 温习" + (stage.review ? " ✓" : "") + "</button>";
    
    // 学习阶段
    html += "<button class='stage-btn " + (stage.learn ? "done" : "") + "' data-day='" + day + "' data-subject='" + subject + "' data-idx='" + taskIdx + "' data-stage='learn' style='" + this.stageBtnStyle(stage.learn, "#FEF0F0","#D94A4A") + "'>✏️ 学习" + (stage.learn ? " ✓" : "") + "</button>";
    
    // 练习阶段
    html += "<button class='stage-btn " + (stage.practice ? "done" : "") + "' data-day='" + day + "' data-subject='" + subject + "' data-idx='" + taskIdx + "' data-stage='practice' style='" + this.stageBtnStyle(stage.practice, "#F6FFED","#52C41A") + "'>✅ 练习" + (stage.practice ? " ✓" : "") + "</button>";
    
    // 录音按钮（针对朗读/背诵/音频任务）
    if (task.tag === "audio" || task.tag === "recite" || task.tag === "read") {
      var rKey = day + "_" + subject + "_" + taskIdx;
      var hasRecord = StudyTracker.getRecordingUrl(rKey, "audio");
      html += "<button class='record-btn-sm " + (hasRecord ? "has-record" : "") + "' data-taskkey='" + rKey + "' data-type='audio' style='padding:6px 10px;border:none;border-radius:8px;background:" + (hasRecord ? "#F6FFED" : "#FFF0F0") + ";color:" + (hasRecord ? "#52C41A" : "#FF4D4F") + ";font-size:0.78rem;cursor:pointer;'>🎤 " + (hasRecord ? "已录音" : "录音") + "</button>";
    }
    
    html += "</div></li>";
  }
  
  html += "</ul></div>";
  return html;
};

// 阶段按钮样式
App.stageBtnStyle = function(done, bg, color) {
  return "padding:5px 10px;border:" + (done ? "1px solid " + color : "1px solid #E2E8F0") + ";border-radius:8px;background:" + (done ? bg : "white") + ";color:" + (done ? color : "#718096") + ";font-size:0.75rem;cursor:pointer;transition:all 0.2s;";
};

// ---------- 覆盖原任务渲染 ----------
App.renderSectionOriginal2 = App.renderSection;
App.renderSection = function(section, day, subject, sectionIdx) {
  if (section.type === "task") {
    return this.renderTaskEnhanced(section, day, subject, sectionIdx);
  }
  // 检查增强类型
  if (typeof App.renderEnhancedSection === 'function') {
    var enhancedTypes = ["timeline","visual-context","video","bar-chart","donut-chart",
                         "number-line","abs-demo","step-reveal","phonetic-enhanced",
                         "phonetic-compare","word-tree","mnemonic","fun-fact","speak-panel","flip-card"];
    if (enhancedTypes.indexOf(section.type) > -1) {
      return App.renderEnhancedSection(section);
    }
  }
  return this.renderSectionOriginal2(section, day, subject, sectionIdx);
};

// ---------- 绑定三阶段事件 ----------
App.bindTrackerEvents = function(day, subject) {
  var self = this;
  
  // 阶段按钮
  var stageBtns = document.querySelectorAll(".stage-btn");
  for (var i = 0; i < stageBtns.length; i++) {
    (function(btn) {
      btn.addEventListener("click", function(e) {
        e.stopPropagation();
        var d = parseInt(this.getAttribute("data-day"));
        var s = this.getAttribute("data-subject");
        var idx = parseInt(this.getAttribute("data-idx"));
        var stage = this.getAttribute("data-stage");
        var done = StudyTracker.toggleStage(d, s, idx, stage);
        // 更新样式
        var colors = {review:{bg:"#E8F0FE",c:"#4A90D9"}, learn:{bg:"#FEF0F0",c:"#D94A4A"}, practice:{bg:"#F6FFED",c:"#52C41A"}};
        var clr = colors[stage];
        this.style.cssText = App.stageBtnStyle(done, clr.bg, clr.c);
        this.textContent = (stage === "review" ? "📖 温习" : stage === "learn" ? "✏️ 学习" : "✅ 练习") + (done ? " ✓" : "");
        this.className = "stage-btn" + (done ? " done" : "");
        // 刷新进度
        App.renderSummary(App.getDayData(App.currentDay));
        App.renderProgress();
        App.renderDaySelector();
      });
    })(stageBtns[i]);
  }
  
  // 录音按钮
  var recordBtns = document.querySelectorAll(".record-btn-sm");
  for (var j = 0; j < recordBtns.length; j++) {
    (function(btn) {
      btn.addEventListener("click", function(e) {
        e.stopPropagation();
        var taskKey = this.getAttribute("data-taskkey");
        var type = this.getAttribute("data-type");
        
        if (StudyTracker.isRecording()) {
          StudyTracker.stopRecording();
          this.textContent = "🎤 录音";
          this.style.background = "#FFF0F0";
          this.style.color = "#FF4D4F";
          return;
        }
        
        // 检查是否有已有录音
        var hasUrl = StudyTracker.getRecordingUrl(taskKey, type);
        if (hasUrl) {
          // 播放或重新录制
          if (confirm("已有录音记录，点击确定重新录制，取消播放已有录音？")) {
            // 重新录制
            this.textContent = "⏹ 停止";
            this.style.background = "#FF4D4F";
            this.style.color = "white";
            var self2 = this;
            StudyTracker.startRecording(type, taskKey, function(url, blob) {
              self2.textContent = "🎤 已录音 ✓";
              self2.style.background = "#F6FFED";
              self2.style.color = "#52C41A";
              alert("✅ 录音成功！可继续完成其他任务。");
            });
          } else {
            // 播放已有录音
            var audio = new Audio(hasUrl);
            audio.play();
          }
          return;
        }
        
        // 开始录音
        this.textContent = "⏹ 停止录音";
        this.style.background = "#FF4D4F";
        this.style.color = "white";
        var self3 = this;
        
        StudyTracker.startRecording(type, taskKey, function(url, blob) {
          if (url) {
            self3.textContent = "🎤 已录音 ✓";
            self3.style.background = "#F6FFED";
            self3.style.color = "#52C41A";
            alert("✅ 录音成功！背诵/朗读已保存。");
          }
        });
      });
    })(recordBtns[j]);
  }
};

// ---------- 生成每日学习报告 ----------
App.showDayReport = function(day) {
  var report = StudyTracker.generateDayReport(day);
  if (!report) {
    alert("暂无数据");
    return;
  }
  
  var pct = report.totalTasks > 0 ? Math.round(report.completedTasks / report.totalTasks * 100) : 0;
  var pctColor = pct >= 80 ? "#52C41A" : (pct >= 50 ? "#FAAD14" : "#FF4D4F");
  var pctEmoji = pct >= 80 ? "🌟" : (pct >= 50 ? "💪" : "📚");
  
  var html = "<div class='modal-handle'></div>";
  html += "<div class='modal-title'>" + pctEmoji + " 第" + day + "天学习报告</div>";
  
  // 总体进度
  html += "<div style='text-align:center;margin-bottom:16px;'>";
  html += "<div style='font-size:2rem;font-weight:800;color:" + pctColor + ";'>" + pct + "%</div>";
  html += "<div style='font-size:0.85rem;color:var(--text-light);'>完成度</div>";
  html += "<div class='progress-bar' style='margin:8px 0;'><div class='fill' style='width:" + pct + "%;background:" + pctColor + ";'></div></div>";
  html += "<div style='font-size:0.78rem;color:var(--text-light);'>";
  html += "任务：" + report.completedTasks + "/" + report.totalTasks + "项";
  if (report.recordings > 0) html += " · 🎤录音：" + report.recordings + "条";
  if (report.totalErrors > 0) html += " · ❌错题：" + report.totalErrors + "题（已复习" + report.reviewedErrors + "题）";
  html += "</div></div>";
  
  // 各科详情
  html += "<div style='margin-bottom:12px;'>";
  var subs = ["chinese","math","english"];
  var subjColors = {chinese:"#D94A4A", math:"#2B6CB0", english:"#38A169"};
  for (var s = 0; s < subs.length; s++) {
    var sub = report.subjects[subs[s]];
    if (!sub) continue;
    var subPct = sub.tasks > 0 ? Math.round(sub.completed / sub.tasks * 100) : 0;
    html += "<div style='margin:6px 0;padding:8px 12px;background:#FAFAFA;border-radius:8px;'>";
    html += "<div style='display:flex;justify-content:space-between;font-size:0.82rem;'>";
    html += "<span style='font-weight:600;color:" + subjColors[subs[s]] + ";'>" + sub.name + "</span>";
    html += "<span>" + sub.completed + "/" + sub.tasks + "（" + subPct + "%）</span>";
    html += "</div>";
    // 三阶段进度
    html += "<div style='display:flex;gap:4px;margin-top:4px;font-size:0.7rem;color:var(--text-light);'>";
    html += "<span>📖温习" + sub.stages.review + "</span>";
    html += "<span>✏️学习" + sub.stages.learn + "</span>";
    html += "<span>✅练习" + sub.stages.practice + "</span>";
    if (sub.errors > 0) html += "<span style='color:var(--danger);'>❌错" + sub.errors + "</span>";
    html += "</div></div>";
  }
  html += "</div>";
  
  // 错题本
  if (report.totalErrors > 0) {
    html += "<div style='margin-bottom:12px;'>";
    html += "<div style='font-size:0.9rem;font-weight:700;margin-bottom:6px;'>❌ 错题本（点击可标记已复习）</div>";
    for (var s = 0; s < subs.length; s++) {
      var errors = StudyTracker.getErrors(day, subs[s]);
      for (var e = 0; e < errors.length; e++) {
        var err = errors[e];
        html += "<div class='error-card' data-day='" + day + "' data-subject='" + subs[s] + "' data-idx='" + e + "' style='padding:10px;margin:6px 0;background:" + (err.reviewed ? "#F6FFED" : "#FFF2F0") + ";border-radius:8px;border-left:3px solid " + (err.reviewed ? "#52C41A" : "#FF4D4F") + ";cursor:pointer;'>";
        html += "<div style='font-size:0.82rem;'>" + err.question + "</div>";
        html += "<div style='display:flex;gap:12px;font-size:0.78rem;margin-top:4px;'>";
        html += "<span style='color:var(--danger);'>你的答案：" + err.wrongAnswer + "</span>";
        html += "<span style='color:var(--success);'>正确答案：" + err.correctAnswer + "</span>";
        if (err.reviewed) html += "<span style='color:var(--success);'>✅ 已复习</span>";
        else html += "<span style='color:var(--warning);'>⏳ 待复习</span>";
        html += "</div></div>";
      }
    }
    html += "</div>";
  }
  
  // 错题点击复习
  html += "<div style='text-align:center;'>";
  html += "<button onclick=\"var m=document.getElementById('reportModal');if(m)m.className='modal-overlay';\" style='padding:10px 24px;border:none;border-radius:8px;background:var(--primary);color:white;font-size:0.85rem;cursor:pointer;'>关闭报告</button>";
  html += "</div>";
  
  // 显示到模态框
  var modal = document.getElementById("reportModal");
  if (!modal) {
    modal = document.createElement("div");
    modal.id = "reportModal";
    modal.className = "modal-overlay";
    modal.innerHTML = "<div class='modal-content' id='reportContent'>" + html + "</div>";
    document.body.appendChild(modal);
  } else {
    document.getElementById("reportContent").innerHTML = html;
  }
  modal.className = "modal-overlay show";
  
  // 绑定错题点击事件
  setTimeout(function() {
    var errorCards = document.querySelectorAll(".error-card");
    for (var i = 0; i < errorCards.length; i++) {
      errorCards[i].addEventListener("click", function() {
        var d = parseInt(this.getAttribute("data-day"));
        var s = this.getAttribute("data-subject");
        var idx = parseInt(this.getAttribute("data-idx"));
        StudyTracker.markErrorReviewed(d, s, idx);
        this.style.background = "#F6FFED";
        this.style.borderLeftColor = "#52C41A";
        var spans = this.querySelectorAll("span");
        for (var k = 0; k < spans.length; k++) {
          if (spans[k].textContent.indexOf("待复习") > -1) spans[k].textContent = "✅ 已复习";
        }
        // 增加趣味反馈
        var feedbacks = ["👍 继续加油！", "🎉 你又进步了！", "💪 离学霸又近一步！", "🌟 错题不可怕，怕的是不改！"];
        var fb = feedbacks[Math.floor(Math.random() * feedbacks.length)];
        var tip = document.createElement("div");
        tip.style.cssText = "text-align:center;font-size:0.8rem;color:var(--success);margin-top:4px;animation:popIn 0.3s ease;";
        tip.textContent = fb;
        this.appendChild(tip);
        setTimeout(function() { tip.remove(); }, 2000);
      });
    }
  }, 100);
};

// ---------- 总学习报告 ----------
App.showOverallReport = function() {
  var stats = StudyTracker.getOverallStats();
  var totalDays = COURSE_DATA.length;
  var allPct = stats.totalTasks > 0 ? Math.round(stats.completedTasks / stats.totalTasks * 100) : 0;
  
  var html = "<div class='modal-handle'></div>";
  html += "<div class='modal-title'>📊 总学习报告</div>";
  
  // 统计卡片
  html += "<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;'>";
  html += "<div style='background:#EBF8FF;padding:12px;border-radius:8px;text-align:center;'><div style='font-size:1.3rem;font-weight:700;color:#2B6CB0;'>" + stats.daysDone + "/" + totalDays + "</div><div style='font-size:0.75rem;color:var(--text-light);'>完成天数</div></div>";
  html += "<div style='background:#F6FFED;padding:12px;border-radius:8px;text-align:center;'><div style='font-size:1.3rem;font-weight:700;color:#52C41A;'>" + allPct + "%</div><div style='font-size:0.75rem;color:var(--text-light);'>总完成度</div></div>";
  html += "<div style='background:#FEF0F0;padding:12px;border-radius:8px;text-align:center;'><div style='font-size:1.3rem;font-weight:700;color:#D94A4A;'>" + stats.errors + "</div><div style='font-size:0.75rem;color:var(--text-light);'>错题数</div></div>";
  html += "<div style='background:#F0FFF4;padding:12px;border-radius:8px;text-align:center;'><div style='font-size:1.3rem;font-weight:700;color:#38A169;'>" + stats.recordings + "</div><div style='font-size:0.75rem;color:var(--text-light);'>录音数</div></div>";
  html += "</div>";
  
  // 总进度条
  html += "<div style='margin-bottom:12px;'><div style='display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:4px;'><span>总进度</span><span>" + stats.completedTasks + "/" + stats.totalTasks + "</span></div>";
  html += "<div class='progress-bar'><div class='fill' style='width:" + allPct + "%;background:linear-gradient(90deg,#4A90D9,#52C41A);'></div></div></div>";
  
  // 鼓励语
  var msg = "";
  if (allPct >= 90) msg = "🌟 太棒了！你几乎完成了所有任务，新学期一定会突飞猛进！";
  else if (allPct >= 70) msg = "💪 做得很好！继续保持这种学习劲头，你就是学霸！";

      this.data = raw ? JSON.parse(raw) : {};
    } catch(e) {
      this.data = {};
    }
  },
  
  save: function() {
    try {
      localStorage.setItem(this.STORAGE_KEY, JSON.stringify(this.data));
    } catch(e) {}
  },
  
  // 获取某天某科的掌握度
  getMastery: function(day, subject) {
    var key = day + "_" + subject;
    return this.data[key] || {
      rating: 0,          // 1-5 自评得分
      weakTags: [],       // 薄弱知识点
      status: "new",      // "new" | "learning" | "weak" | "mastered"  
      reviewCount: 0,
      nextReview: null,   // 下次复习在哪一天
      lastReviewTime: null,
      firstReviewed: false
    };
  },
  
  // 提交自评
  submitRating: function(day, subject, rating, weakTags) {
    var key = day + "_" + subject;
    var mastery = this.getMastery(day, subject);
    mastery.rating = rating;
    mastery.weakTags = weakTags || [];
    mastery.lastReviewTime = new Date().toISOString();
    mastery.reviewCount = (mastery.reviewCount || 0) + 1;
    mastery.firstReviewed = true;
    
    // 根据评分确定状态
    if (rating >= 4 && weakTags.length === 0) {
      mastery.status = "mastered";
      mastery.nextReview = null;
    } else if (rating >= 3) {
      mastery.status = "learning";
      mastery.nextReview = day + 1; // 明天再复习一次
    } else {
      mastery.status = "weak";
      mastery.nextReview = day + 1; // 明天必须复习
    }
    
    this.data[key] = mastery;
    this.save();
    return mastery;
  },
  
  // 获取某天需要复习的科目列表
  getReviewQueue: function(day) {
    var queue = [];
    for (var key in this.data) {
      var parts = key.split("_");
      var d = parseInt(parts[0]);
      var subject = parts[1];
      var mastery = this.data[key];
      if (mastery.nextReview && mastery.nextReview <= day && d < day) {
        // 需要复习且不是今天才学的
        if (mastery.status === "weak" || (mastery.status === "learning" && mastery.reviewCount < 2)) {
          queue.push({day: d, subject: subject, mastery: mastery});
        }
      }
    }
    return queue;
  },
  
  // 获取所有薄弱知识点
  getAllWeakPoints: function() {
    var weak = [];
    for (var key in this.data) {
      var parts = key.split("_");
      var d = parseInt(parts[0]);
      var subject = parts[1];
      var mastery = this.data[key];
      if (mastery.weakTags && mastery.weakTags.length > 0) {
        weak.push({
          day: d,
          subject: subject,
          tags: mastery.weakTags,
          rating: mastery.rating
        });
      }
    }
    return weak;
  },
  
  // 获取总体掌握度统计
  getOverallStats: function() {
    var total = 0;
    var mastered = 0;
    var weak = 0;
    var totalRating = 0;
    var totalWeakTags = 0;
    
    for (var key in this.data) {
      if (!this.data[key].firstReviewed) continue;
      total++;
      totalRating += this.data[key].rating;
      if (this.data[key].status === "mastered") mastered++;
      if (this.data[key].status === "weak") weak++;
      if (this.data[key].weakTags) totalWeakTags += this.data[key].weakTags.length;
    }
    
    return {
      total: total,
      mastered: mastered,
      weak: weak,
      avgRating: total > 0 ? (totalRating / total).toFixed(1) : 0,
      totalWeakTags: totalWeakTags,
      weakRate: total > 0 ? Math.round(weak / total * 100) : 0,
      masterRate: total > 0 ? Math.round(mastered / total * 100) : 0
    };
  }
};

MasterySystem.init();

</script>

// ---------- 自评卡片（放在每科内容底部） ----------
App.MasteryUI = {

    var points = MasterySystem.knowledgePoints[subject] && MasterySystem.knowledgePoints[subject][day];
    
    var html = "<div id='mastery-card-" + subject + "' class='content-section'>";
    html += "<div class='section-title'><span>📊</span>自我评估：今天掌握了吗？</div>";
    html += "<div style='background:white;border:1px solid var(--border);border-radius:12px;padding:14px;'>";
    
    // 评级（星星）
    html += "<div style='margin-bottom:10px;'>";
    html += "<div style='font-size:0.82rem;font-weight:600;margin-bottom:6px;'>⭐ 掌握程度（点击星星自评）</div>";
    html += "<div style='display:flex;gap:4px;' id='rating-stars-" + subject + "'>";
    for (var i = 1; i <= 5; i++) {
      var filled = i <= mastery.rating;
      html += "<span class='rating-star' data-rating='" + i + "' data-subject='" + subject + "' style='font-size:1.6rem;cursor:pointer;transition:all 0.2s;" + (filled ? "color:#F6AD55;" : "color:#E2E8F0;") + "'>★</span>";
    }
    html += "</div>";
    if (mastery.rating > 0) {
      var labels = ["","需要努力","有点难","基本掌握","熟练掌握","完全掌握"];
      html += "<div style='font-size:0.78rem;color:var(--text-light);margin-top:2px;'>" + labels[mastery.rating] + "</div>";
    }
    html += "</div>";
    
    // 薄弱点选择
    if (points && points.length > 0) {
      html += "<div style='margin-bottom:10px;'>";
      html += "<div style='font-size:0.82rem;font-weight:600;margin-bottom:6px;'>🎯 哪些地方还有困难？（可多选）</div>";
      html += "<div style='display:flex;flex-wrap:wrap;gap:6px;' id='weak-tags-" + subject + "'>";
      for (var p = 0; p < points.length; p++) {
        var selected = mastery.weakTags && mastery.weakTags.indexOf(points[p]) > -1;
        html += "<span class='weak-tag' data-tag='" + points[p] + "' data-subject='" + subject + "' style='padding:4px 12px;border-radius:16px;font-size:0.78rem;cursor:pointer;transition:all 0.2s;background:" + (selected ? "#FEF0F0" : "#F7FAFC") + ";color:" + (selected ? "#D94A4A" : "#718096") + ";border:1px solid " + (selected ? "#FED7D7" : "#E2E8F0") + ";'>" + points[p] + "</span>";
      }

    // 提交按钮
    var hasRating = mastery.rating > 0;
    html += "<button class='submit-mastery' data-subject='" + subject + "' style='padding:8px 20px;border:none;border-radius:8px;background:" + (hasRating ? "var(--success)" : "var(--primary)") + ";color:white;font-size:0.82rem;font-weight:600;cursor:pointer;width:100%;'>" + (hasRating ? "✅ 已评估（点击更新）" : "📝 提交评估") + "</button>";

    // 绑定事件

  },
  
  createDummyElement: function(html) {
    var div = document.createElement("div");
    div.innerHTML = html;
    return div.firstElementChild;
  },
  
  // 绑定星星事件
  bindStarEvents: function(day, subject) {
    var stars = document.querySelectorAll("#rating-stars-" + subject + " .rating-star");
    for (var i = 0; i < stars.length; i++) {
      stars[i].addEventListener("click", function() {
        var rating = parseInt(this.getAttribute("data-rating"));

        var allStars = document.querySelectorAll("#rating-stars-" + subj + " .rating-star");
        for (var s = 0; s < allStars.length; s++) {
          var r = parseInt(allStars[s].getAttribute("data-rating"));

        // 暂存评分
        this.closest(".content-section").setAttribute("data-temp-rating", rating);
      });
    }
  },
  
  // 绑定标签事件
  bindTagEvents: function(day, subject) {
    var tags = document.querySelectorAll("#weak-tags-" + subject + " .weak-tag");
    for (var i = 0; i < tags.length; i++) {
      tags[i].addEventListener("click", function() {
        var isSelected = this.style.background === "rgb(254, 240, 240)" || this.style.background === "#FEF0F0";
        if (isSelected) {
          this.style.background = "#F7FAFC";
          this.style.color = "#718096";
          this.style.borderColor = "#E2E8F0";
        } else {
          this.style.background = "#FEF0F0";
          this.style.color = "#D94A4A";
          this.style.borderColor = "#FED7D7";
        }
      });
    }
  },
  
  // 绑定提交事件
  bindSubmitEvent: function(day, subject) {
    var btn = document.querySelector(".submit-mastery[data-subject='" + subject + "']");
    if (!btn) return;
    btn.addEventListener("click", function() {
      var subj = this.getAttribute("data-subject");
      
      // 获取评分
      var card = this.closest(".content-section");
      var tempRating = card.getAttribute("data-temp-rating");
      var rating = tempRating ? parseInt(tempRating) : 0;
      
      // 如果没有评分，默认可选
      if (rating === 0) {
        // 检查是否有已选的星星
        var selectedStars = document.querySelectorAll("#rating-stars-" + subj + " .rating-star[style*='#F6AD55']");
        if (selectedStars.length > 0) {
          rating = selectedStars.length;
        }
      }
      
      if (rating === 0) {
        alert("请先点击星星选择掌握程度哦~");
        return;
      }
      
      // 获取选中的薄弱点
      var weakTags = [];
      var tags = document.querySelectorAll("#weak-tags-" + subj + " .weak-tag");
      for (var i = 0; i < tags.length; i++) {
        if (tags[i].style.background === "#FEF0F0" || tags[i].style.background === "rgb(254, 240, 240)") {
          weakTags.push(tags[i].getAttribute("data-tag"));
        }
      }
      
      // 提交到系统
      MasterySystem.submitRating(day, subj, rating, weakTags);
      
      // 反馈
      var labels = ["","💪 没关系，明天再复习！","📚 再加把劲！","👍 基本掌握，再巩固一下！","🌟 掌握得不错！","🎉 完全掌握！太棒了！"];
      var feedback = labels[rating] || "已记录！";
      var needsReview = rating < 3 ? "\n⚠️ 系统已安排明天自动复习薄弱点" : (weakTags.length > 0 ? "\n📝 薄弱点已记录，明天会安排复习" : "");
      
      this.textContent = "✅ 已评估" + (rating >= 4 ? " 🎉" : " 💪");
      this.style.background = "var(--success)";
      
      alert(feedback + needsReview);
      
      // 刷新进度和报告
      App.renderSummary(App.getDayData(day));
      App.renderProgress();
    });
  }
};

};
